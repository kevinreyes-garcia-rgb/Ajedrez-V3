<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez Pro - Agnes vs Rick</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- INTRO -->
    <div id="intro-video" class="video-overlay">
        <video id="video-player" muted controls>
            <source src="assets/video/intro.mp4" type="video/mp4">
        </video>
        <button id="skip-intro">Saltar →</button>
    </div>

    <div class="container">

        <!-- INICIO -->
        <div id="screen-start" class="screen active">
            <img src="assets/images/logo.png" class="logo-img">
            <p class="subtitle">Elige tu oponente</p>

            <div class="characters">
                <div class="card" id="btn-agnes">
                    <img src="assets/images/agnes.png" class="avatar-img">
                    <h2>Agnes</h2>
                </div>

                <div class="card" id="btn-rick">
                    <img src="assets/images/rick.png" class="avatar-img">
                    <h2>Rick</h2>
                </div>
            </div>
        </div>

        <!-- DIFICULTAD -->
        <div id="screen-diff" class="screen">
            <h2 id="diff-title"></h2>

            <div class="diff-buttons">
                <button class="diff-btn easy" data-diff="easy">Fácil</button>
                <button class="diff-btn medium" data-diff="medium">Normal</button>
                <button class="diff-btn hard" data-diff="hard">Difícil</button>
                <button class="diff-btn extreme" data-diff="extreme">Extremo</button>
            </div>

            <button class="back-btn" id="back-btn">← Volver</button>
        </div>

        <!-- JUEGO -->
        <div id="screen-game" class="screen">
            <div id="board"></div>
        </div>

    </div>

    <!-- AUDIOS -->
    <audio id="snd-click" src="assets/sounds/click.mp3"></audio>
    <audio id="snd-bg" src="assets/sounds/background.mp3" loop></audio>

    <!-- SCRIPTS -->
    <script src="js/chess-engine.js" defer></script>
    <script src="js/ai.js" defer></script>
    <script src="js/game.js" defer></script>

    <!-- 🔥 FIX REAL -->
    <script>
    document.addEventListener("DOMContentLoaded", () => {

        let selectedChar = null;

        const screens = document.querySelectorAll(".screen");

        function showScreen(id) {
            screens.forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        function playClick() {
            const snd = document.getElementById("snd-click");
            if (snd) {
                snd.currentTime = 0;
                snd.play();
            }
        }

        // 🎬 INTRO
        document.getElementById("skip-intro").onclick = () => {
            document.getElementById("intro-video").style.display = "none";
        };

        // 👤 PERSONAJES
        document.getElementById("btn-agnes").onclick = () => {
            playClick();
            selectedChar = "agnes";
            document.getElementById("diff-title").innerText = "Agnes";
            showScreen("screen-diff");
        };

        document.getElementById("btn-rick").onclick = () => {
            playClick();
            selectedChar = "rick";
            document.getElementById("diff-title").innerText = "Rick";
            showScreen("screen-diff");
        };

        // 🎮 DIFICULTAD
        document.querySelectorAll(".diff-btn").forEach(btn => {
            btn.onclick = () => {
                playClick();

                const diff = btn.dataset.diff;

                showScreen("screen-game");

                // 🔥 LLAMA TU JUEGO REAL
                if (typeof startGame === "function") {
                    startGame(selectedChar, diff);
                }

                // 🎵 música
                const bg = document.getElementById("snd-bg");
                if (bg) {
                    bg.volume = 0.3;
                    bg.play();
                }
            };
        });

        // 🔙 VOLVER
        document.getElementById("back-btn").onclick = () => {
            playClick();
            showScreen("screen-start");
        };

    });
    </script>

</body>
</html>
