<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez Pro - Agnes vs Rick</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Video de intro -->
    <div id="intro-video" class="video-overlay">
        <video id="video-player" muted controls>
            <source src="assets/video/intro.mp4" type="video/mp4">
        </video>
        <button id="skip-intro" onclick="skipIntro()">Saltar →</button>
    </div>

    <div class="container">
        <!-- Pantalla 1: Inicio -->
        <div id="screen-start" class="screen active">
            <img src="assets/images/logo.png" alt="Ajedrez Pro" class="logo-img">
            <p class="subtitle">Elige tu oponente</p>
            
            <div class="characters">
                <div class="card" onclick="selectChar('agnes')">
                    <img src="assets/images/agnes.png" alt="Agnes" class="avatar-img">
                    <h2>Agnes</h2>
                    <p>La Estratega</p>
                    <div class="tags">
                        <span class="tag easy">Fácil</span>
                        <span class="tag medium">Normal</span>
                        <span class="tag hard">Difícil</span>
                        <span class="tag extreme">Extremo</span>
                        <span class="tag mega">Mega Extremo</span>
                    </div>
                </div>
                
                <div class="card" onclick="selectChar('rick')">
                    <img src="assets/images/rick.png" alt="Rick" class="avatar-img">
                    <h2>Rick</h2>
                    <p>El Jugador Casual</p>
                    <div class="tags">
                        <span class="tag easy">Fácil</span>
                        <span class="tag medium">Normal</span>
                        <span class="tag hard">Difícil</span>
                        <span class="tag extreme">Extremo</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pantalla 2: Dificultad -->
        <div id="screen-diff" class="screen">
            <h2 class="difficulty-title" id="diff-title"></h2>
            <div class="diff-buttons" id="diff-container"></div>
            <button class="back-btn" onclick="goBack()">← Volver</button>
        </div>

        <!-- Pantalla 3: Juego -->
        <div id="screen-game" class="screen">
            <div class="game-info">
                <div class="player-box">
                    <img id="opponent-img" src="" alt="Oponente" class="player-img">
                    <div class="player-name" id="opponent-name">Oponente</div>
                    <div class="timer" id="timer-black">10:00</div>
                </div>
                <div class="turn-indicator" id="game-status">Tu turno</div>
                <div class="player-box">
                    <div class="player-avatar">🧑</div>
                    <div class="player-name">Tú (Blancas)</div>
                    <div class="timer" id="timer-white">10:00</div>
                </div>
            </div>
            
            <div class="board-wrapper">
                <div id="board"></div>
                <div class="promotion-modal" id="promo-modal">
                    <h3>Promoción</h3>
                    <p>Elige tu nueva pieza:</p>
                    <div class="promo-pieces">
                        <img src="assets/images/pieces/w-queen.png" onclick="promote('q')" alt="Reina">
                        <img src="assets/images/pieces/w-rook.png" onclick="promote('r')" alt="Torre">
                        <img src="assets/images/pieces/w-bishop.png" onclick="promote('b')" alt="Alfil">
                        <img src="assets/images/pieces/w-knight.png" onclick="promote('n')" alt="Caballo">
                    </div>
                </div>
            </div>
            
            <div class="status" id="status-text"></div>
            
            <div class="controls">
                <button onclick="toggleSound()" id="sound-btn">🔊 Sonido ON</button>
                <button onclick="resign()">🏳️ Rendirse</button>
                <button onclick="newGame()">🔄 Nueva partida</button>
            </div>
        </div>

        <!-- Modal Final -->
        <div class="modal" id="end-modal">
            <div class="modal-content">
                <img id="end-img" src="" alt="" class="end-avatar">
                <h2 id="end-title">¡Juego Terminado!</h2>
                <p id="end-msg"></p>
                <div class="end-buttons">
                    <button onclick="toMenu()">📋 Menú Principal</button>
                    <button onclick="rematch()">🔁 Revancha</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audios -->
    <audio id="snd-click" src="assets/sounds/click.mp3" preload="auto"></audio>
    <audio id="snd-move" src="assets/sounds/move.mp3" preload="auto"></audio>
    <audio id="snd-capture" src="assets/sounds/capture.mp3" preload="auto"></audio>
    <audio id="snd-check" src="assets/sounds/check.mp3" preload="auto"></audio>
    <audio id="snd-castle" src="assets/sounds/castle.mp3" preload="auto"></audio>
    <audio id="snd-promote" src="assets/sounds/promote.mp3" preload="auto"></audio>
    <audio id="snd-win" src="assets/sounds/win.mp3" preload="auto"></audio>
    <audio id="snd-lose" src="assets/sounds/lose.mp3" preload="auto"></audio>
    <audio id="snd-draw" src="assets/sounds/draw.mp3" preload="auto"></audio>
    <audio id="snd-bg" src="assets/sounds/background.mp3" loop preload="auto"></audio>

    <!-- Scripts -->
    <script src="js/chess-engine.js" defer></script>
    <script src="js/ai.js" defer></script>
    <script src="js/game.js" defer></script>

    <!-- 🔧 FIX DEL BOTÓN SALTAR -->
    <script>
    function skipIntro() {
        const intro = document.getElementById("intro-video");

        // Oculta el intro
        intro.style.display = "none";

        // Detiene el video
        const video = document.getElementById("video-player");
        if (video) {
            video.pause();
            video.currentTime = 0;
        }
    }

    // Auto-saltar cuando termine el video
    document.addEventListener("DOMContentLoaded", function() {
        const video = document.getElementById("video-player");
        if (video) {
            video.addEventListener("ended", skipIntro);
        }
    });
    </script>

</body>
</html>
